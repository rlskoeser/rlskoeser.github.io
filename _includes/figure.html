{% comment %}
Template for figure with caption.
Based on http://stackoverflow.com/questions/19331362/using-an-image-caption-in-markdown-jekyll, via programming historian.
{% endcomment %}
<figure{% if include.class %} class="{{include.class }}"{% endif %}>
	<a href="{{ include.src }}">
		<img src="{{ include.src }}" alt="{{ include.caption }}">
	</a>
<figcaption>
    {{ include.caption }}
</figcaption>
</figure>
